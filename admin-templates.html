<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MasterFlow - Flow Studio</title>

  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/ADMIN_APPEND.css">
</head>

<body class="workspace-page" data-page="admin-templates">
  <div class="content-shell">
    <main>

      <div class="flow-studio-heading">
        <div class="flow-studio-title">
          <div class="eyebrow">Enterprise governance</div>
          <h1>Flow Studio</h1>
          <p id="roleDescription"></p>

          <div class="flow-studio-title-actions">
            <a href="admin-rules-access.html" class="btn btn-secondary">Governance</a>
            <button id="resetTemplates" class="btn btn-secondary">Reset</button>
          </div>
        </div>

        <aside class="flow-role-panel">
          <label>View as</label>
          <select id="adminRoleSelect" class="select">
            <option value="platform-admin">Megan Delia — Enterprise Administrator</option>
            <option value="category-owner">IT Queue & Category Manager</option>
          </select>
        </aside>
      </div>

      <div class="template-manager">
        <aside class="card template-list-card">
          <h2>Request Flows</h2>

<p id="templateCount">
  Loading…
</p>

<input
  id="templateSearch"
  class="input"
  placeholder="Search..."
>
          <div id="templateList"></div>
        </aside>

        <form id="templateForm" class="card">
          <h2 id="editorTitle"></h2>
          <div id="templateEditorBody"></div>
          <button type="submit" class="btn btn-primary">Save</button>
        </form>
      </div>

    </main>
  </div>

  <script src="assets/js/store.js" defer></script>
  <script src="assets/js/templates.js" defer></script>
  <script src="assets/js/layout.js" defer></script>
  <script src="assets/js/request-engine.js" defer></script>
  <script src="assets/js/request-engine-v2.js" defer></script>
  <script src="assets/js/pages/admin-templates.js" defer></script>
  <script src="assets/js/pages/admin-flow-studio.js" defer></script>
  <script src="assets/js/pages/admin-flow-feedback.js" defer></script>
</body>
</html>
